app = 'vitalsight-api'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = '3001'
  NODE_ENV = 'production'
  TRUST_PROXY = '1'
  FRONTEND_ORIGINS = 'https://vitalsight.tech,https://vitalsight-api.fly.dev'
  PRESAGE_BRIDGE_URL = 'http://127.0.0.1:8787'
  PRESAGE_BRIDGE_MODE = 'sdk'
  PRESAGE_ALLOW_VIDEO_UPLOAD_IN_PRODUCTION = 'true'
