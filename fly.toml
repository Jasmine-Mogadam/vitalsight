app = 'vitalsight-api'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = '3001'
  FRONTEND_ORIGIN = 'https://vitalsight-api.fly.dev'
